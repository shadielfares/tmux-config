# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Pane resizing with leader + direction keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r Right swap-window -t +1
bind -r Left swap-window -t -1

set-option -g default-shell "/bin/zsh"
set-option -g default-command "/bin/zsh"

#Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#Fixing colors, so we have consistent theme
set-option -sa terminal-overrides ",xterm*:Tc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# --- Copy mode (vi) and macOS clipboard integration ---
set -g mode-keys vi
set -g set-clipboard on

# Start selection with Space or v; copy with y or Enter (to pbcopy)
bind -T copy-mode-vi Space send -X begin-selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Rose Pine theme colors
set -g status-style 'bg=#191724 fg=#e0def4'
set -g status-left '#[bg=#31748f,fg=#191724,bold] #S #[bg=#191724] '
set -g status-right '#[fg=#908caa]%H:%M '
set -g window-status-current-format '#[bg=#26233a,fg=#ebbcba,bold] #I:#W '
set -g window-status-format '#[fg=#6e6a86] #I:#W '
set -g pane-border-style 'fg=#26233a'
set -g pane-active-border-style 'fg=#31748f'
set -g message-style 'bg=#1f1d2e fg=#e0def4'
